<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Багаж өгөх</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    background:#f4f6f9;
}

.sidebar{
    width:280px;
    background:#2E445D;
    color:white;
    padding:20px;
    box-shadow:2px 0 10px rgba(0,0,0,0.1);
    flex-shrink:0;
}

.sidebar h2{
    margin-bottom:25px;
    text-align:center;
}

.menu-btn{
    width:100%;
    padding:15px;
    margin-bottom:8px;
    border:none;
    border-radius:10px;
    background:#374B63;
    color:white;
    font-size:18px;
    font-weight:600;
    text-align:left;
    cursor:pointer;
    transition:.3s;
}

.menu-btn:hover{
    background:#46607f;
}

.back-btn{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,.15);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.back-btn:hover{
    background:rgba(255,255,255,.3);
}

.content{
    flex:1;
    padding:40px;
    overflow-y:auto;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.search-box input{
    flex:1;
    padding:15px;
    border:1px solid #d0d7de;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

.search-box input:focus{
    border-color:#374B63;
}

.search-box button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:#374B63;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.search-box button:hover{
    background:#46607f;
}

.info-card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.info-card h2{
    margin-bottom:15px;
    color:#374B63;
}

.info-card p{
    color:#555;
    line-height:1.7;
}

.section-title{
    color:#374B63;
    font-size:1.6rem;
    margin-bottom:20px;
    font-weight:700;
}

.tool-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
    gap:20px;
}

.empty-msg{
    color:#888;
    font-size:16px;
    padding:20px 0;
}

.history-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.history-card.selected{
    border:3px solid #374B63;
    box-shadow:0 0 0 3px rgba(55,75,99,.25);
}

.history-images{
    display:flex;
}

.history-images .img-half{
    flex:1;
    position:relative;
    height:150px;
    background:#e9edf2;
    overflow:hidden;
}

.history-images .img-half img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.history-images .img-half .no-img{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    opacity:.3;
}

.history-images .img-half .img-label{
    position:absolute;
    bottom:0;left:0;right:0;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:12px;
    text-align:center;
    padding:3px 0;
}

.history-card .tool-name{
    padding:15px 15px 5px;
    font-weight:600;
    color:#2E445D;
    text-align:center;
}

.history-card .tool-meta{
    padding:0 15px 15px;
    font-size:13px;
    color:#888;
    text-align:center;
    line-height:1.5;
}

.select-btn{
    margin:10px 15px 15px;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#374B63;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.select-btn:hover{
    background:#46607f;
}

.modal-overlay{
    display:none;
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,.55);
    align-items:center;
    justify-content:center;
    z-index:1000;
    padding:20px;
}

.modal-overlay.show{
    display:flex;
}

.modal-box{
    background:white;
    border-radius:20px;
    max-width:700px;
    width:100%;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.3);
    display:flex;
    flex-wrap:wrap;
}

.modal-img{
    flex:1 1 280px;
    min-height:280px;
    display:flex;
}

.modal-img .img-half{
    flex:1;
    position:relative;
    background:#e9edf2;
    overflow:hidden;
}

.modal-img .img-half img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.modal-img .img-half .no-img{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:48px;
    opacity:.3;
}

.modal-img .img-half .img-label{
    position:absolute;
    bottom:0;left:0;right:0;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:12px;
    text-align:center;
    padding:3px 0;
}

.modal-info{
    flex:1 1 260px;
    padding:30px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    position:relative;
}

.modal-close{
    position:absolute;
    top:15px;
    right:20px;
    background:none;
    border:none;
    font-size:24px;
    cursor:pointer;
    color:#888;
}

.modal-close:hover{
    color:#333;
}

.modal-info h2{
    color:#2E445D;
    margin-bottom:15px;
    font-size:1.8rem;
}

.modal-info .info-row{
    margin-bottom:12px;
    font-size:16px;
    color:#444;
}

.modal-info .info-row b{
    color:#374B63;
}

.modal-info .take-btn{
    margin-top:20px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#5D83B3,#4F6E91);
    color:white;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.modal-info .take-btn:hover{
    background:linear-gradient(135deg,#6d92c0,#5D83B3);
    transform:translateY(-2px);
}

.modal-info .take-btn:disabled{
    background:#ccc;
    cursor:not-allowed;
}

.camera-overlay{
    display:none;
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,.85);
    align-items:center;
    justify-content:center;
    z-index:1100;
    padding:20px;
    flex-direction:column;
}

.camera-overlay.show{
    display:flex;
}

.camera-overlay video,
.camera-overlay canvas{
    max-width:90vw;
    max-height:65vh;
    border-radius:15px;
    background:#000;
}

.camera-overlay canvas{
    display:none;
}

#faceOverlay{
    display:block !important;
    max-width:90vw;
    max-height:65vh;
}

.camera-controls{
    margin-top:20px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.camera-controls button{
    padding:14px 28px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

#btnCapture{
    background:#4F6E91;
    color:white;
}
#btnCapture:hover{
    background:#5D83B3;
}

#btnRetake{
    background:#888;
    color:white;
    display:none;
}
#btnRetake:hover{
    background:#666;
}

#btnConfirm{
    background:#2e8b57;
    color:white;
    display:none;
}
#btnConfirm:hover{
    background:#3aa86a;
}

#btnConfirm:disabled{
    background:#ccc;
    cursor:not-allowed;
}

#btnCameraClose{
    background:#b03a3a;
    color:white;
}
#btnCameraClose:hover{
    background:#c94545;
}

#btnSwitchCam{
    background:#374B63;
    color:white;
}
#btnSwitchCam:hover{
    background:#46607f;
}

.camera-status{
    color:white;
    margin-top:15px;
    font-size:15px;
    text-align:center;
    min-height:20px;
}

@media(max-width:768px){
    body{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
    }
    .menu-btn{
        font-size:16px;
    }
    .content{
        padding:20px;
    }
    .search-box{
        flex-direction:column;
    }
    .modal-box{
        flex-direction:column;
    }
    .modal-img{
        flex-direction:row;
    }
}

</style>
</head>

<body>

<div class="sidebar">
    <button class="back-btn" onclick="window.location.href='index.html'">← Буцах</button>
    <h2>📤 БУЦААХ</h2>
    <button class="menu-btn" onclick="loadTakenTools()">📋 Авсан багажууд</button>
    <button class="menu-btn" onclick="loadHistory()">📜 Түүх (буцаасан)</button>
</div>

<div class="content">

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Багаж хайх...">
        <button onclick="searchTaken()">Хайх</button>
    </div>

    <div id="welcomeCard" class="info-card">
        <h2>Тавтай морил</h2>
        <p>Зүүн талын цэснээс "Авсан багажууд" дээр дарж буцаах багажаа сонгоно уу.</p>
    </div>

    <div id="toolSection" style="display:none;">
        <div class="section-title" id="toolSectionTitle">Багаж</div>
        <div class="tool-grid" id="toolGrid"></div>
    </div>

</div>

<!-- Сонгогдсон багажийн floating bar -->
<div id="returnBar" style="display:none; position:fixed; bottom:0; left:0; right:0; background:#374B63; color:white; padding:16px 24px; align-items:center; justify-content:space-between; box-shadow:0 -4px 20px rgba(0,0,0,.2); z-index:500;">
    <div id="returnCount" style="font-weight:600; font-size:16px;">0 багаж сонгогдсон</div>
    <button onclick="openCartDetail()" style="padding:12px 28px; border:none; border-radius:10px; background:linear-gradient(135deg,#5D83B3,#4F6E91); color:white; font-size:16px; font-weight:700; cursor:pointer;">📷 Буцаах</button>
</div>

<div class="modal-overlay" id="detailModal">
    <div class="modal-box" style="flex-direction:column; max-width:480px;">
        <div class="modal-info" style="padding:24px;">
            <button class="modal-close" onclick="closeModal()">✕</button>
            <h2 style="margin-bottom:16px;">Буцаах багажууд</h2>
            <div id="cartList" style="display:flex; flex-direction:column; gap:10px; max-height:300px; overflow-y:auto; margin-bottom:10px;"></div>
            <button class="take-btn" id="modalActionBtn" onclick="openCamera()">📷 Зураг авч баталгаажуулах</button>
        </div>
    </div>
</div>

<div class="camera-overlay" id="cameraModal">
    <div style="position:relative;">
        <video id="cameraVideo" autoplay playsinline></video>
        <canvas id="faceOverlay" style="position:absolute; top:0; left:0; pointer-events:none;"></canvas>
    </div>
    <canvas id="cameraCanvas"></canvas>
    <div class="camera-status" id="cameraStatus">Камер бэлдэж байна...</div>
    <div class="camera-controls">
        <button id="btnCapture" onclick="captureImage()" disabled>📸 Зураг авах</button>
        <button id="btnRetake" onclick="retakeImage()">🔄 Дахин авах</button>
        <button id="btnConfirm" onclick="confirmCapture()">✅ Хадгалах</button>
        <button id="btnSwitchCam" onclick="switchCamera()">🔁 Камер сэлгэх</button>
        <button id="btnCameraClose" onclick="closeCamera()">✕ Хаах</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

let categoriesCache = [];
let currentSelection = null;
let currentMode = null;

function escapeHtml(str){
    if(!str) return "";
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function categoryName(categoryId){
    const cat = categoriesCache.find(c => c.id === categoryId);
    return cat ? cat.name : "Тодорхойгүй";
}

async function loadCategories(){
    try{
        const snap = await db.collection("categories").get();
        categoriesCache = [];
        snap.forEach(doc => categoriesCache.push({ id: doc.id, ...doc.data() }));
    }catch(err){
        console.error("Категори ачаалахад алдаа:", err);
    }
}

async function loadTakenTools(){
    currentMode = "taken";
    document.getElementById('welcomeCard').style.display = 'none';
    document.getElementById('toolSection').style.display = 'block';
    document.getElementById('toolSectionTitle').textContent = "📋 Авсан багажууд";

    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '<p class="empty-msg">Уншиж байна...</p>';

    try{
        const snap = await db.collection("transactions")
            .where("status", "==", "borrowed")
            .orderBy("timestamp", "desc")
            .get();

        const records = [];
        snap.forEach(doc => records.push({ id: doc.id, ...doc.data() }));
        renderTaken(records);
    }catch(err){
        console.error("Авсан багаж ачаалахад алдаа:", err);
        grid.innerHTML = '<p class="empty-msg">⚠️ Ачаалахад алдаа гарлаа: ' + escapeHtml(err.message) + '</p>';
    }
}

/* ---------- Олон багаж сонгох (буцаах сагс) ---------- */
// selectedReturnItems: [{ toolId, toolName, categoryId, catalogImageUrl,
//                          qty, txIds: [id, id, ...] }]
// txIds нь тухайн toolId-н борлуулсан (борлуулсан = авсан) ganц
// transaction-уудаас QTY ширхэгийг сонгож авсан жагсаалт.
let selectedReturnItems = [];
let takenGroupsCache = []; // [{ toolId, toolName, categoryId, catalogImageUrl, qty (нийт авсан), txIds: [...] }]

function getSelectedReturnQty(toolId){
    const item = selectedReturnItems.find(i => i.toolId === toolId);
    return item ? item.qty : 0;
}

function changeReturnQty(toolId, delta){
    const group = takenGroupsCache.find(g => g.toolId === toolId);
    if(!group) return;

    let item = selectedReturnItems.find(i => i.toolId === toolId);
    const currentQty = item ? item.qty : 0;
    const newQty = currentQty + delta;

    if(newQty < 1){
        if(item){
            const idx = selectedReturnItems.findIndex(i => i.toolId === toolId);
            selectedReturnItems.splice(idx, 1);
        }
    }else if(newQty <= group.qty){
        const txIds = group.txIds.slice(0, newQty); // эхний N transaction-ийг сонгоно
        if(item){
            item.qty = newQty;
            item.txIds = txIds;
        }else{
            selectedReturnItems.push({
                toolId: group.toolId,
                toolName: group.toolName,
                categoryId: group.categoryId,
                catalogImageUrl: group.catalogImageUrl,
                qty: newQty,
                txIds: txIds
            });
        }
    }

    updateReturnBar();
    refreshTakenCardDisplay(toolId);
}

function refreshTakenCardDisplay(toolId){
    const card = document.querySelector(`.history-card[data-tool-id="${toolId}"]`);
    if(!card) return;
    const btnWrap = card.querySelector('.return-btn-wrap');
    if(!btnWrap) return;

    const group = takenGroupsCache.find(g => g.toolId === toolId);
    const qty = getSelectedReturnQty(toolId);

    card.classList.toggle('selected', qty > 0);

    if(qty > 0){
        btnWrap.innerHTML = `
            <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                <button onclick="changeReturnQty('${toolId}', -1)" style="width:32px; height:32px; border:none; border-radius:8px; background:#e9edf2; font-size:18px; font-weight:700; cursor:pointer;">−</button>
                <span style="font-weight:700; min-width:20px; text-align:center;">${qty}</span>
                <button onclick="changeReturnQty('${toolId}', 1)" style="width:32px; height:32px; border:none; border-radius:8px; background:#e9edf2; font-size:18px; font-weight:700; cursor:pointer;">+</button>
            </div>
        `;
    }else{
        btnWrap.innerHTML = `<button class="select-btn" onclick="changeReturnQty('${toolId}', 1)">Буцаах</button>`;
    }
}

function updateReturnBar(){
    const bar = document.getElementById('returnBar');
    const countEl = document.getElementById('returnCount');
    const totalQty = selectedReturnItems.reduce((sum, item) => sum + item.qty, 0);
    if(selectedReturnItems.length === 0){
        bar.style.display = 'none';
    }else{
        bar.style.display = 'flex';
        countEl.textContent = `${totalQty} ширхэг (${selectedReturnItems.length} төрөл) сонгогдсон`;
    }
}

// "Авсан багажууд" жагсаалтыг toolId-аар нэгтгэж бүлэг болгоно
function groupTakenRecords(records){
    const groups = {};
    records.forEach(rec => {
        if(!groups[rec.toolId]){
            groups[rec.toolId] = {
                toolId: rec.toolId,
                toolName: rec.toolName,
                categoryId: rec.categoryId,
                catalogImageUrl: rec.catalogImageUrl,
                pickupPhotoUrl: rec.pickupPhotoUrl,
                qty: 0,
                txIds: []
            };
        }
        groups[rec.toolId].qty += 1;
        groups[rec.toolId].txIds.push(rec.id);
    });
    return Object.values(groups);
}

function renderTaken(records){
    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '';

    takenGroupsCache = groupTakenRecords(records);

    if(takenGroupsCache.length === 0){
        grid.innerHTML = '<p class="empty-msg">Одоогоор авсан багаж байхгүй байна.</p>';
        return;
    }

    takenGroupsCache.forEach(group => {
        const card = document.createElement('div');
        const selectedQty = getSelectedReturnQty(group.toolId);
        card.className = 'history-card' + (selectedQty > 0 ? ' selected' : '');
        card.setAttribute('data-tool-id', group.toolId);

        const btnWrapHtml = selectedQty > 0
            ? `<div style="display:flex; align-items:center; justify-content:center; gap:10px;">
                 <button onclick="changeReturnQty('${group.toolId}', -1)" style="width:32px; height:32px; border:none; border-radius:8px; background:#e9edf2; font-size:18px; font-weight:700; cursor:pointer;">−</button>
                 <span style="font-weight:700; min-width:20px; text-align:center;">${selectedQty}</span>
                 <button onclick="changeReturnQty('${group.toolId}', 1)" style="width:32px; height:32px; border:none; border-radius:8px; background:#e9edf2; font-size:18px; font-weight:700; cursor:pointer;">+</button>
               </div>`
            : `<button class="select-btn" onclick="changeReturnQty('${group.toolId}', 1)">Буцаах</button>`;

        card.innerHTML =
            '<div class="history-images">' +
                '<div class="img-half">' +
                    (group.catalogImageUrl
                        ? '<img src="' + group.catalogImageUrl + '" alt="' + escapeHtml(group.toolName) + ' - багаж">'
                        : '<div class="no-img">🛠️</div>') +
                    '<div class="img-label">Багаж</div>' +
                '</div>' +
                '<div class="img-half">' +
                    '<img src="' + group.pickupPhotoUrl + '" alt="' + escapeHtml(group.toolName) + ' - авсан үеийн зураг">' +
                    '<div class="img-label">Авсан үед</div>' +
                '</div>' +
            '</div>' +
            '<div class="tool-name">' + escapeHtml(group.toolName) + ' <span style="color:#888; font-weight:500;">x' + group.qty + '</span></div>' +
            '<div class="tool-meta">' + escapeHtml(categoryName(group.categoryId)) + '</div>' +
            '<div class="return-btn-wrap" style="margin:10px 15px 15px;">' + btnWrapHtml + '</div>';
        grid.appendChild(card);
    });
}

async function searchTaken(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();

    if(currentMode !== "taken"){
        await loadTakenTools();
    }

    if(!q) return;

    try{
        const snap = await db.collection("transactions")
            .where("status", "==", "borrowed")
            .orderBy("timestamp", "desc")
            .get();

        const records = [];
        snap.forEach(doc => {
            const data = doc.data();
            if(data.toolName.toLowerCase().includes(q)){
                records.push({ id: doc.id, ...data });
            }
        });

        document.getElementById('toolSectionTitle').textContent = '🔍 Хайлтын үр дүн: "' + q + '"';
        renderTaken(records);
    }catch(err){
        console.error(err);
    }
}

async function loadHistory(){
    currentMode = "history";
    document.getElementById('welcomeCard').style.display = 'none';
    document.getElementById('toolSection').style.display = 'block';
    document.getElementById('toolSectionTitle').textContent = "📜 Түүх (буцаасан багажууд, сүүлийн 2 хоног)";

    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '<p class="empty-msg">Уншиж байна...</p>';

    try{
        const snap = await db.collection("transactions")
            .where("status", "==", "returned")
            .orderBy("timestamp", "desc")
            .limit(100)
            .get();

        // Хэрэглэгчийн site дээр зөвхөн сүүлийн 2 хоногийн (48 цаг) бичлэгийг
        // харуулна. Admin талд бүх түүх хадгалагдсаар үлдэнэ — энэ нь зөвхөн
        // ДЭЛГЭЦИЙН шүүлт, Firestore-ийн өгөгдөл устгагдахгүй.
        const twoDaysAgoMs = Date.now() - (2 * 24 * 60 * 60 * 1000);

        const records = [];
        snap.forEach(doc => {
            const data = doc.data();
            const ts = data.returnTimestamp || data.timestamp;
            const tsMs = ts && ts.toDate ? ts.toDate().getTime() : 0;
            if(tsMs >= twoDaysAgoMs){
                records.push({ id: doc.id, ...data });
            }
        });
        renderHistory(records);
    }catch(err){
        console.error("Түүх ачаалахад алдаа:", err);
        grid.innerHTML = '<p class="empty-msg">⚠️ Ачаалахад алдаа гарлаа: ' + escapeHtml(err.message) + '</p>';
    }
}

function renderHistory(records){
    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '';

    if(records.length === 0){
        grid.innerHTML = '<p class="empty-msg">Түүхэн бүртгэл хоосон байна.</p>';
        return;
    }

    records.forEach(rec => {
        const card = document.createElement('div');
        card.className = 'history-card';
        const takenStr = rec.timestamp ? rec.timestamp.toDate().toLocaleString('mn-MN') : '—';
        const returnedStr = rec.returnTimestamp ? rec.returnTimestamp.toDate().toLocaleString('mn-MN') : '—';
        card.innerHTML =
            '<div class="history-images">' +
                '<div class="img-half">' +
                    (rec.catalogImageUrl
                        ? '<img src="' + rec.catalogImageUrl + '" alt="' + escapeHtml(rec.toolName) + ' - багаж">'
                        : '<div class="no-img">🛠️</div>') +
                    '<div class="img-label">Багаж</div>' +
                '</div>' +
                '<div class="img-half">' +
                    '<img src="' + rec.pickupPhotoUrl + '" alt="' + escapeHtml(rec.toolName) + ' - авсан">' +
                    '<div class="img-label">Авсан</div>' +
                '</div>' +
                '<div class="img-half">' +
                    '<img src="' + rec.returnPhotoUrl + '" alt="' + escapeHtml(rec.toolName) + ' - өгсөн">' +
                    '<div class="img-label">Өгсөн</div>' +
                '</div>' +
            '</div>' +
            '<div class="tool-name">' + escapeHtml(rec.toolName) + '</div>' +
            '<div class="tool-meta">' +
                escapeHtml(categoryName(rec.categoryId)) + '<br>' +
                'Авсан: ' + takenStr + '<br>' +
                'Өгсөн: ' + returnedStr +
            '</div>';
        grid.appendChild(card);
    });
}

function openCartDetail(){
    if(selectedReturnItems.length === 0) return;

    const list = document.getElementById('cartList');
    list.innerHTML = '';

    selectedReturnItems.forEach(item => {
        const row = document.createElement('div');
        row.style.cssText = 'display:flex; align-items:center; gap:12px; padding:8px; background:#f4f6f9; border-radius:10px;';
        row.innerHTML =
            '<div style="width:48px; height:48px; border-radius:8px; overflow:hidden; flex-shrink:0; background:#e9edf2; display:flex; align-items:center; justify-content:center;">' +
                (item.catalogImageUrl
                    ? '<img src="' + item.catalogImageUrl + '" style="width:100%; height:100%; object-fit:cover;">'
                    : '<span style="font-size:20px; opacity:.3;">🛠️</span>') +
            '</div>' +
            '<div style="flex:1;">' +
                '<div style="font-weight:600; color:#2E445D;">' + escapeHtml(item.toolName) + ' <span style="color:#888; font-weight:500;">x ' + item.qty + '</span></div>' +
                '<div style="font-size:12px; color:#888;">' + escapeHtml(categoryName(item.categoryId)) + '</div>' +
            '</div>' +
            '<button onclick="removeFromReturnCart(\'' + item.toolId + '\')" style="border:none; background:none; color:#b03a3a; font-size:18px; cursor:pointer; padding:4px 8px;">✕</button>';
        list.appendChild(row);
    });

    document.getElementById('detailModal').classList.add('show');
}

function removeFromReturnCart(toolId){
    const idx = selectedReturnItems.findIndex(i => i.toolId === toolId);
    if(idx >= 0) selectedReturnItems.splice(idx, 1);
    updateReturnBar();
    refreshTakenCardDisplay(toolId);
    if(selectedReturnItems.length === 0){
        closeModal();
    }else{
        openCartDetail();
    }
}

function closeModal(){
    document.getElementById('detailModal').classList.remove('show');
}

let cameraStream = null;
let capturedBlob = null;
let isSaving = false;
let currentFacing = "user"; // "user" = урд тал, "environment" = арын тал

// ---------- Нүүр царай таних (face-api.js) ----------
let faceModelsLoaded = false;
let faceCheckInterval = null;
let faceDetectedOk = false;

async function ensureFaceModelsLoaded(){
    if(faceModelsLoaded) return;
    const MODEL_URL = "https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/weights";
    document.getElementById('cameraStatus').textContent = "Бэлдэж байна...";
    await faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL);
    faceModelsLoaded = true;
}

function startFaceCheckLoop(){
    const video = document.getElementById('cameraVideo');
    const overlay = document.getElementById('faceOverlay');

    if(faceCheckInterval) clearInterval(faceCheckInterval);

    faceCheckInterval = setInterval(async () => {
        if(!video.videoWidth || !video.videoHeight) return;

        overlay.width = video.clientWidth;
        overlay.height = video.clientHeight;
        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);

        const ovalW = overlay.width * 0.55;
        const ovalH = overlay.height * 0.7;
        const ovalX = overlay.width / 2;
        const ovalY = overlay.height / 2;

        let detection = null;
        try{
            detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions());
        }catch(e){
            // detection алдаа гарвал зүгээр алгасна
        }

        const scaleX = overlay.width / video.videoWidth;
        const scaleY = overlay.height / video.videoHeight;

        let isInsideOval = false;
        if(detection){
            const box = detection.box;
            const centerX = (box.x + box.width / 2) * scaleX;
            const centerY = (box.y + box.height / 2) * scaleY;
            const faceW = box.width * scaleX;
            const faceH = box.height * scaleY;

            const dx = (centerX - ovalX) / (ovalW / 2);
            const dy = (centerY - ovalY) / (ovalH / 2);
            const withinOval = (dx * dx + dy * dy) <= 1.0;
            const sizeOk = faceW >= ovalW * 0.45 && faceH >= ovalH * 0.45;
            isInsideOval = withinOval && sizeOk;
        }

        faceDetectedOk = isInsideOval;

        ctx.strokeStyle = isInsideOval ? "#374B63" : "rgba(255,255,255,0.85)";
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.ellipse(ovalX, ovalY, ovalW / 2, ovalH / 2, 0, 0, 2 * Math.PI);
        ctx.stroke();

        const captureBtn = document.getElementById('btnCapture');
        const statusEl = document.getElementById('cameraStatus');
        if(captureBtn.style.display !== 'none'){
            if(isInsideOval){
                captureBtn.disabled = false;
                statusEl.textContent = "✅ Бэлэн байна — Зураг ав";
            }else{
                captureBtn.disabled = true;
                statusEl.textContent = detection
                    ? "Нүүрээ oval хүрээний дунд төвлөрүүлнэ үү"
                    : "Нүүрээ камерт харуулна уу";
            }
        }
    }, 300);
}

function stopFaceCheckLoop(){
    if(faceCheckInterval){
        clearInterval(faceCheckInterval);
        faceCheckInterval = null;
    }
    const overlay = document.getElementById('faceOverlay');
    const ctx = overlay.getContext('2d');
    ctx.clearRect(0, 0, overlay.width, overlay.height);
}

async function openCamera(){
    document.getElementById('cameraModal').classList.add('show');
    document.getElementById('cameraStatus').textContent = "Камер бэлдэж байна...";
    document.getElementById('btnCapture').style.display = 'inline-block';
    document.getElementById('btnCapture').disabled = true;
    document.getElementById('btnRetake').style.display = 'none';
    document.getElementById('btnConfirm').style.display = 'none';

    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('cameraCanvas');
    video.style.display = 'block';
    canvas.style.display = 'none';

    currentFacing = "user"; // Хэрэглэгчийн нүүр царайг зурагдахын тулд эхэлж УРД талын камераар нээнэ
    await startCameraStream();
    await ensureFaceModelsLoaded();
    startFaceCheckLoop();
}

async function startCameraStream(){
    const video = document.getElementById('cameraVideo');
    try{
        if(cameraStream){
            cameraStream.getTracks().forEach(t => t.stop());
        }
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacing },
            audio: false
        });
        video.srcObject = cameraStream;
        document.getElementById('cameraStatus').textContent = "Нүүрээ камерт харуулна уу";
    }catch(err){
        document.getElementById('cameraStatus').textContent =
            "⚠️ Камерт хандах боломжгүй байна. Зөвшөөрөл олгосон эсэхээ шалгана уу.";
        console.error(err);
    }
}

async function switchCamera(){
    currentFacing = (currentFacing === "user") ? "environment" : "user";
    document.getElementById('cameraStatus').textContent = "Камер сэлгэж байна...";
    await startCameraStream();
}

function captureImage(){
    if(!faceDetectedOk) return;

    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('cameraCanvas');

    const maxWidth = 800;
    let w = video.videoWidth, h = video.videoHeight;
    if(w > maxWidth){
        h = Math.round(h * maxWidth / w);
        w = maxWidth;
    }
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, w, h);

    video.style.display = 'none';
    canvas.style.display = 'block';
    stopFaceCheckLoop();

    canvas.toBlob(blob => {
        capturedBlob = blob;
    }, 'image/jpeg', 0.75);

    document.getElementById('btnCapture').style.display = 'none';
    document.getElementById('btnRetake').style.display = 'inline-block';
    document.getElementById('btnConfirm').style.display = 'inline-block';
    document.getElementById('cameraStatus').textContent = "Зураг авлаа. Зөв бол хадгал, эсвэл дахин ав.";
}

function retakeImage(){
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('cameraCanvas');

    video.style.display = 'block';
    canvas.style.display = 'none';
    capturedBlob = null;

    document.getElementById('btnCapture').style.display = 'inline-block';
    document.getElementById('btnCapture').disabled = true;
    document.getElementById('btnRetake').style.display = 'none';
    document.getElementById('btnConfirm').style.display = 'none';
    document.getElementById('cameraStatus').textContent = "Нүүрээ камерт харуулна уу";
    startFaceCheckLoop();
}

async function confirmCapture(){
    if(!capturedBlob || selectedReturnItems.length === 0 || isSaving){
        return;
    }
    isSaving = true;
    document.getElementById('btnConfirm').disabled = true;
    document.getElementById('cameraStatus').textContent = "Хадгалж байна...";

    try{
        // 1. Өгсөн үеийн зургийг (нэг зураг, бүх багажид адилхан) Storage-д
        //    нэг удаа хадгална
        const filename = 'returns/' + Date.now() + '_' + Math.random().toString(36).slice(2) + '.jpg';
        const ref = storage.ref(filename);
        await ref.put(capturedBlob);
        const returnPhotoUrl = await ref.getDownloadURL();

        // 2. Нэг зэрэг буцаагдсан бичлэгүүдийг холбох зориулалттай batchId
        const returnBatchId = 'rb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);

        // 3. Сонгогдсон БҮХ бичлэгийг боловсруулна (тус бүрийг Firestore
        //    transaction-оор хамгаалсан байдлаар). Tool бүрд QTY ширхэг
        //    transaction (txIds) байгаа тул, тэдгээрийг бүгдийг боловсруулна.
        for(const item of selectedReturnItems){
            const toolRef = db.collection("tools").doc(item.toolId);

            for(const txId of item.txIds){
                const txRef = db.collection("transactions").doc(txId);

                await db.runTransaction(async (transaction) => {
                    const toolDoc = await transaction.get(toolRef);

                    if(toolDoc.exists){
                        const data = toolDoc.data();
                        const available = data.availableQty ?? 0;
                        const total = data.totalQty ?? available + 1;
                        const newAvailable = Math.min(total, available + 1);
                        transaction.update(toolRef, { availableQty: newAvailable });
                    }

                    transaction.update(txRef, {
                        status: "returned",
                        type: "return",
                        returnPhotoUrl: returnPhotoUrl,
                        returnBatchId: returnBatchId,
                        returnTimestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
            }
        }

        // 4. БҮХ багаж амжилттай буцаагдсаны дараа ESP32-д зориулсан
        //    "trigger" бичлэгийг 1 удаа үүсгэнэ — ESP32 энэ document-ийг
        //    тогтмол шалгаж, шинэ trigger гарвал motor ажиллуулна (буцаах
        //    үед ч авах үед ашигласан АДИЛХАН door1 motor-ийг ашиглана).
        await db.collection("esp32_triggers").doc("door1").set({
            triggered: true,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            toolNames: selectedReturnItems.map(item => `${item.toolName} x${item.qty}`)
        });

        document.getElementById('cameraStatus').textContent = "✅ Амжилттай буцаагдсан!";

        setTimeout(() => {
            closeCamera();
            closeModal();
            selectedReturnItems = [];
            updateReturnBar();
            loadTakenTools();
        }, 900);

    }catch(err){
        console.error("Буцаахад алдаа:", err);
        document.getElementById('cameraStatus').textContent =
            "⚠️ Алдаа гарлаа: " + err.message;
    }finally{
        isSaving = false;
        document.getElementById('btnConfirm').disabled = false;
    }
}

function closeCamera(){
    if(cameraStream){
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
    }
    capturedBlob = null;
    stopFaceCheckLoop();
    document.getElementById('cameraModal').classList.remove('show');
}

document.getElementById('detailModal').addEventListener('click', (e) => {
    if(e.target.id === 'detailModal') closeModal();
});

auth.onAuthStateChanged(user => {
    if(!user){
        window.location.href = "index.html";
    }else{
        loadCategories();
    }
});
