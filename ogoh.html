<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Багаж өгөх</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    min-height:100vh;
    font-family:'Segoe UI',sans-serif;
    background:#f4f6f9;
}

.sidebar{
    width:280px;
    background:#2E445D;
    color:white;
    padding:20px;
    box-shadow:2px 0 10px rgba(0,0,0,0.1);
    flex-shrink:0;
}

.sidebar h2{
    margin-bottom:25px;
    text-align:center;
}

.menu-btn{
    width:100%;
    padding:15px;
    margin-bottom:8px;
    border:none;
    border-radius:10px;
    background:#374B63;
    color:white;
    font-size:18px;
    font-weight:600;
    text-align:left;
    cursor:pointer;
    transition:.3s;
}

.menu-btn:hover{
    background:#46607f;
}

.back-btn{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    border:none;
    border-radius:10px;
    background:rgba(255,255,255,.15);
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.back-btn:hover{
    background:rgba(255,255,255,.3);
}

.content{
    flex:1;
    padding:40px;
    overflow-y:auto;
    transition:margin-right .3s;
}

.content.shifted{
    margin-right:320px;
}

.search-box{
    display:flex;
    gap:10px;
    margin-bottom:25px;
}

.search-box input{
    flex:1;
    padding:15px;
    border:1px solid #d0d7de;
    border-radius:10px;
    font-size:16px;
    outline:none;
}

.search-box input:focus{
    border-color:#374B63;
}

.search-box button{
    padding:15px 25px;
    border:none;
    border-radius:10px;
    background:#374B63;
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.search-box button:hover{
    background:#46607f;
}

.info-card{
    background:white;
    padding:30px;
    border-radius:15px;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

.info-card h2{
    margin-bottom:15px;
    color:#374B63;
}

.info-card p{
    color:#555;
    line-height:1.7;
}

.section-title{
    color:#374B63;
    font-size:1.6rem;
    margin-bottom:20px;
    font-weight:700;
}

.tool-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(200px, 1fr));
    gap:20px;
}

.empty-msg{
    color:#888;
    font-size:16px;
    padding:20px 0;
}

.history-card{
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
    position:relative;
}

.history-card.selected{
    border:3px solid #374B63;
    box-shadow:0 0 0 3px rgba(55,75,99,.25);
}

.history-images{
    display:flex;
    position:relative;
}

.history-images .img-half{
    flex:1;
    position:relative;
    height:150px;
    background:#e9edf2;
    overflow:hidden;
}

.history-images .img-half img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.history-images .img-half .no-img{
    width:100%;
    height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:32px;
    opacity:.3;
}

.history-images .img-half .img-label{
    position:absolute;
    bottom:0;left:0;right:0;
    background:rgba(0,0,0,.55);
    color:white;
    font-size:12px;
    text-align:center;
    padding:3px 0;
}

.qty-corner-badge{
    position:absolute;
    top:8px;
    right:8px;
    background:#f59e0b;
    color:white;
    font-size:13px;
    font-weight:800;
    padding:4px 10px;
    border-radius:20px;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
    z-index:2;
}

.history-card .tool-name{
    padding:15px 15px 5px;
    font-weight:600;
    color:#2E445D;
    text-align:center;
}

.qty-badge{
    display:inline-block;
    background:#374B63;
    color:white;
    font-size:12px;
    font-weight:700;
    padding:2px 9px;
    border-radius:10px;
    margin-left:6px;
    vertical-align:middle;
}

.history-card .tool-meta{
    padding:0 15px 15px;
    font-size:13px;
    color:#888;
    text-align:center;
    line-height:1.5;
}

.select-btn{
    width:100%;
    padding:10px;
    border:none;
    border-radius:8px;
    background:#374B63;
    color:white;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

.select-btn:hover{
    background:#46607f;
}

.qty-select-controls{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

.qty-select-controls button{
    width:32px;
    height:32px;
    border:none;
    border-radius:8px;
    background:#e9edf2;
    font-size:18px;
    font-weight:700;
    cursor:pointer;
}

.qty-select-controls span{
    font-weight:700;
    min-width:20px;
    text-align:center;
}

.qty-select-note{
    text-align:center;
    font-size:12px;
    color:#374B63;
    font-weight:700;
    margin-top:6px;
}

/* ---------- Cart sidebar (баруун тал) ---------- */

.cart-sidebar{
    position:fixed;
    top:0;
    right:0;
    bottom:0;
    width:320px;
    background:white;
    box-shadow:-4px 0 20px rgba(0,0,0,.12);
    z-index:800;
    display:flex;
    flex-direction:column;
    transform:translateX(100%);
    transition:transform .3s ease;
}

.cart-sidebar.show{
    transform:translateX(0);
}

.cart-header{
    background:#2E445D;
    color:white;
    padding:20px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-shrink:0;
}

.cart-header .cart-title{
    font-size:18px;
    font-weight:700;
}

.cart-header .cart-total{
    background:rgba(255,255,255,.15);
    padding:6px 14px;
    border-radius:20px;
    font-size:14px;
    font-weight:600;
}

.cart-sidebar-list{
    flex:1;
    overflow-y:auto;
    padding:16px;
}

.cart-group{
    margin-bottom:18px;
}

.cart-group-title{
    font-size:14px;
    font-weight:700;
    color:#374B63;
    background:#eef2f7;
    padding:8px 12px;
    border-radius:8px;
    margin-bottom:8px;
}

.cart-item-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 6px;
    border-bottom:1px solid #f0f0f0;
}

.cart-item-row:last-child{
    border-bottom:none;
}

.cart-item-img{
    width:44px;
    height:44px;
    border-radius:8px;
    overflow:hidden;
    flex-shrink:0;
    background:#e9edf2;
    display:flex;
    align-items:center;
    justify-content:center;
}

.cart-item-img img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.cart-item-img span{
    font-size:18px;
    opacity:.3;
}

.cart-item-info{
    flex:1;
    min-width:0;
}

.cart-item-name{
    font-weight:600;
    color:#2E445D;
    font-size:14px;
    margin-bottom:6px;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
}

.cart-item-qty-controls{
    display:flex;
    align-items:center;
    gap:6px;
}

.cart-item-qty-controls button{
    width:26px;
    height:26px;
    border:none;
    border-radius:6px;
    background:#e9edf2;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
}

.cart-item-qty-controls span{
    font-weight:700;
    min-width:18px;
    text-align:center;
    font-size:14px;
}

.cart-item-remove{
    margin-left:auto;
    background:none !important;
    color:#b03a3a;
    font-size:16px;
    width:auto !important;
}

.cart-take-btn{
    flex-shrink:0;
    margin:16px;
    padding:16px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#5D83B3,#4F6E91);
    color:white;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.cart-take-btn:hover{
    background:linear-gradient(135deg,#6d92c0,#5D83B3);
    transform:translateY(-2px);
}

.camera-overlay{
    display:none;
    position:fixed;
    top:0;left:0;right:0;bottom:0;
    background:rgba(0,0,0,.85);
    align-items:center;
    justify-content:center;
    z-index:1100;
    padding:20px;
    flex-direction:column;
}

.camera-overlay.show{
    display:flex;
}

.camera-overlay video,
.camera-overlay canvas{
    max-width:90vw;
    max-height:65vh;
    border-radius:15px;
    background:#000;
}

.camera-overlay canvas{
    display:none;
}

.camera-controls{
    margin-top:20px;
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    justify-content:center;
}

.camera-controls button{
    padding:14px 28px;
    border:none;
    border-radius:10px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:.3s;
}

#btnCapture{
    background:#4F6E91;
    color:white;
}
#btnCapture:hover{
    background:#5D83B3;
}

#btnRetake{
    background:#888;
    color:white;
    display:none;
}
#btnRetake:hover{
    background:#666;
}

#btnConfirm{
    background:#2e8b57;
    color:white;
    display:none;
}
#btnConfirm:hover{
    background:#3aa86a;
}

#btnConfirm:disabled{
    background:#ccc;
    cursor:not-allowed;
}

#btnCameraClose{
    background:#b03a3a;
    color:white;
}
#btnCameraClose:hover{
    background:#c94545;
}

#btnSwitchCam{
    background:#374B63;
    color:white;
}
#btnSwitchCam:hover{
    background:#46607f;
}

.camera-status{
    color:white;
    margin-top:15px;
    font-size:15px;
    text-align:center;
    min-height:20px;
}

/* Том, харагдахуйц амжилтын панел */

.return-success{
    display:none;
    flex-direction:column;
    align-items:center;
    text-align:center;
    color:white;
    padding:30px 20px;
    max-width:520px;
    width:100%;
}

.return-success.show{
    display:flex;
}

.return-success-icon{
    font-size:72px;
    margin-bottom:10px;
    animation:popIn .35s ease;
}

@keyframes popIn{
    0%{ transform:scale(.4); opacity:0; }
    70%{ transform:scale(1.1); opacity:1; }
    100%{ transform:scale(1); }
}

.return-success-title{
    font-size:30px;
    font-weight:800;
    margin-bottom:8px;
}

.return-success-sub{
    font-size:17px;
    opacity:.85;
    margin-bottom:22px;
}

.return-success-list{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-bottom:28px;
    width:100%;
}

.return-success-box-line{
    background:rgba(255,180,0,.16);
    border:2px solid rgba(255,180,0,.45);
    border-radius:16px;
    padding:18px 22px;
    text-align:left;
}

.return-success-box-line .box-name{
    font-size:24px;
    font-weight:800;
    color:#ffd680;
    margin-bottom:8px;
}

.return-success-box-line .box-items{
    font-size:17px;
    font-weight:600;
    line-height:1.6;
    color:white;
}

.return-success-close{
    padding:16px 46px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#f59e0b,#d97706);
    color:white;
    font-size:19px;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
}

.return-success-close:hover{
    background:linear-gradient(135deg,#fbbf24,#f59e0b);
    transform:translateY(-2px);
}

@media(max-width:768px){
    body{
        flex-direction:column;
    }
    .sidebar{
        width:100%;
    }
    .menu-btn{
        font-size:16px;
    }
    .content{
        padding:20px;
    }
    .content.shifted{
        margin-right:0;
        padding-bottom:280px;
    }
    .search-box{
        flex-direction:column;
    }
    .cart-sidebar{
        top:auto;
        left:0;
        right:0;
        width:100%;
        height:60vh;
        max-height:60vh;
        transform:translateY(100%);
        box-shadow:0 -4px 20px rgba(0,0,0,.15);
        border-radius:20px 20px 0 0;
    }
    .cart-sidebar.show{
        transform:translateY(0);
    }
}

</style>
</head>

<body>

<div class="sidebar">
    <button class="back-btn" onclick="window.location.href='index.html'">← Буцах</button>
    <h2>📤 БУЦААХ</h2>
    <button class="menu-btn" onclick="loadTakenTools()">📋 Авсан багажууд</button>
    <button class="menu-btn" onclick="loadHistory()">📜 Түүх (буцаасан)</button>
</div>

<div class="content" id="mainContent">

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="🔍 Багаж хайх...">
        <button onclick="searchTaken()">Хайх</button>
    </div>

    <div id="welcomeCard" class="info-card">
        <h2>Тавтай морил</h2>
        <p>Зүүн талын цэснээс "Авсан багажууд" дээр дарж буцаах багажаа сонгоно уу.</p>
    </div>

    <div id="toolSection" style="display:none;">
        <div class="section-title" id="toolSectionTitle">Багаж</div>
        <div class="tool-grid" id="toolGrid"></div>
    </div>

</div>

<!-- Баруун талын сагсны панел -->
<div class="cart-sidebar" id="cartSidebar">
    <div class="cart-header">
        <div class="cart-title">🧰 Буцаах сагс</div>
        <div class="cart-total" id="cartTotalCount">0 ш</div>
    </div>
    <div class="cart-sidebar-list" id="cartSidebarList"></div>
    <button class="cart-take-btn" id="cartTakeBtn" onclick="openCamera()">📷 Зураг авч баталгаажуулах</button>
</div>

<div class="camera-overlay" id="cameraModal">
    <video id="cameraVideo" autoplay playsinline></video>
    <canvas id="cameraCanvas"></canvas>
    <div class="camera-status" id="cameraStatus">Камер бэлдэж байна...</div>
    <div class="camera-controls" id="cameraControls">
        <button id="btnCapture" onclick="captureImage()">📸 Зураг авах</button>
        <button id="btnRetake" onclick="retakeImage()">🔄 Дахин авах</button>
        <button id="btnConfirm" onclick="confirmCapture()">✅ Хадгалах</button>
        <button id="btnSwitchCam" onclick="switchCamera()">🔁 Камер сэлгэх</button>
        <button id="btnCameraClose" onclick="closeCamera()">✕ Хаах</button>
    </div>

    <div class="return-success" id="returnSuccess">
        <div class="return-success-icon">📦</div>
        <div class="return-success-title">Амжилттай буцаагдлаа!</div>
        <div class="return-success-sub">Багажаа доорх хайрцгуудад хураагаарай:</div>
        <div class="return-success-list" id="returnSuccessList"></div>
        <button class="return-success-close" onclick="closeReturnSuccess()">Ойлголоо ✓</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script>

let categoriesCache = [];
let currentMode = null;

function escapeHtml(str){
    if(!str) return "";
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function categoryName(categoryId){
    const cat = categoriesCache.find(c => c.id === categoryId);
    return cat ? formatBoxName(cat.name) : "Тодорхойгүй";
}

/* Хайрцгийн нэр зөвхөн тоо (1, 2, 3...) бол "Хайрцаг 1" гэж
   харуулна. Тоо биш бол нэрийг нь өөрчлөхгүй. */
function formatBoxName(name){
    if(name !== undefined && name !== null && /^\d+$/.test(String(name).trim())){
        return `Хайрцаг ${String(name).trim()}`;
    }
    return name;
}

async function loadCategories(){
    try{
        const snap = await db.collection("categories").get();
        categoriesCache = [];
        snap.forEach(doc => categoriesCache.push({ id: doc.id, ...doc.data() }));
    }catch(err){
        console.error("Категори ачаалахад алдаа:", err);
    }
}

async function loadTakenTools(){
    currentMode = "taken";
    document.getElementById('welcomeCard').style.display = 'none';
    document.getElementById('toolSection').style.display = 'block';
    document.getElementById('toolSectionTitle').textContent = "📋 Авсан багажууд";

    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '<p class="empty-msg">Уншиж байна...</p>';

    try{
        const snap = await db.collection("transactions")
            .where("status", "==", "borrowed")
            .orderBy("timestamp", "desc")
            .get();

        const records = [];
        snap.forEach(doc => records.push({ id: doc.id, ...doc.data() }));
        renderTaken(records);
    }catch(err){
        console.error("Авсан багаж ачаалахад алдаа:", err);
        grid.innerHTML = '<p class="empty-msg">⚠️ Ачаалахад алдаа гарлаа: ' + escapeHtml(err.message) + '</p>';
    }
}

/* ---------- Нэг зэрэг авсан ижил багажийг НЭГТГЭХ ---------- */
// Нэг хүн "Авах" хуудсан дээр нэг зэрэг авсан бүх ширхэг ижил
// toolId + borrowBatchId-тай байна (avah.html-ийн confirmCapture
// доторх borrowBatchId). Тиймээс энэ хоёр талбараар бүлэглэвэл:
//   - Нэг хүн 4 ширхэг авсан бол -> 1 карт, "x4"
//   - Өөр хүн (өөр цаг/өөр batch) ижил нэртэй багаж авсан бол -> тусдаа карт
// Хуучин (borrowBatchId талбаргүй) бичлэгүүдийг тус тусад нь
// (өөрийн id-г batch болгон ашиглан) харуулна — эвдрэхгүй байх нөхцөл.

let takenRecordsCache = [];  // [{ id, toolId, toolName, categoryId, catalogImageUrl, pickupPhotoUrl, timestamp, borrowBatchId }]
let groupedTakenCache = [];  // [{ key, toolId, toolName, categoryId, catalogImageUrl, pickupPhotoUrl, timestamp, txIds:[...] }]

// selectedReturnItems: [{ groupKey, toolId, toolName, categoryId, catalogImageUrl, qty, txIds:[...] }]
let selectedReturnItems = [];

function groupTakenRecords(records){
    const groups = {};
    const order = [];

    records.forEach(rec => {
        const batch = rec.borrowBatchId || rec.id; // хуучин бичлэгт batchId байхгүй бол өөрийн id-г ашиглана
        const key = rec.toolId + '__' + batch;

        if(!groups[key]){
            groups[key] = {
                key,
                toolId: rec.toolId,
                toolName: rec.toolName,
                categoryId: rec.categoryId,
                catalogImageUrl: rec.catalogImageUrl,
                pickupPhotoUrl: rec.pickupPhotoUrl,
                timestamp: rec.timestamp,
                txIds: []
            };
            order.push(key);
        }
        groups[key].txIds.push(rec.id);
    });

    return order.map(key => groups[key]);
}

function isGroupSelected(groupKey){
    return selectedReturnItems.some(i => i.groupKey === groupKey);
}

function getSelectedQty(groupKey){
    const item = selectedReturnItems.find(i => i.groupKey === groupKey);
    return item ? item.qty : 0;
}

function toggleReturnSelect(group){
    const idx = selectedReturnItems.findIndex(i => i.groupKey === group.key);
    if(idx >= 0){
        selectedReturnItems.splice(idx, 1);
    }else{
        // Сонгоход анхдагчаар БҮХ ширхгийг (тухайн батчийн бүх txId) сагсанд нэмнэ.
        // Сагсны +/- товчоор хэрэглэгч хэсэгчлэн (жишээ нь 4-с 2-г) буцаах тоог өөрчилж болно.
        selectedReturnItems.push({
            groupKey: group.key,
            toolId: group.toolId,
            toolName: group.toolName,
            categoryId: group.categoryId,
            catalogImageUrl: group.catalogImageUrl,
            qty: group.txIds.length,
            txIds: group.txIds.slice()
        });
    }
    updateReturnSidebar();
    refreshTakenCardDisplay(group.key);
}

function toggleReturnSelectByKey(groupKey){
    const group = groupedTakenCache.find(g => g.key === groupKey);
    if(group) toggleReturnSelect(group);
}

function changeReturnQty(groupKey, delta){
    const item = selectedReturnItems.find(i => i.groupKey === groupKey);
    if(!item) return;

    const group = groupedTakenCache.find(g => g.key === groupKey);
    const maxQty = group ? group.txIds.length : item.qty;
    const newQty = item.qty + delta;

    if(newQty < 1){
        const idx = selectedReturnItems.findIndex(i => i.groupKey === groupKey);
        selectedReturnItems.splice(idx, 1);
    }else if(newQty <= maxQty){
        item.qty = newQty;
        item.txIds = (group ? group.txIds : item.txIds).slice(0, newQty);
    }

    updateReturnSidebar();
    refreshTakenCardDisplay(groupKey);
}

function removeFromReturnCart(groupKey){
    const idx = selectedReturnItems.findIndex(i => i.groupKey === groupKey);
    if(idx >= 0) selectedReturnItems.splice(idx, 1);
    updateReturnSidebar();
    refreshTakenCardDisplay(groupKey);
}

function refreshTakenCardDisplay(groupKey){
    const card = document.querySelector(`.history-card[data-group-key="${groupKey}"]`);
    if(!card) return;

    const group = groupedTakenCache.find(g => g.key === groupKey);
    const btnWrap = card.querySelector('.return-btn-wrap');
    if(!btnWrap || !group) return;

    const selected = isGroupSelected(groupKey);
    card.classList.toggle('selected', selected);

    if(selected){
        const qty = getSelectedQty(groupKey);
        const maxQty = group.txIds.length;
        btnWrap.innerHTML = `
            <div class="qty-select-controls">
                <button onclick="changeReturnQty('${groupKey}', -1)">−</button>
                <span>${qty}</span>
                <button onclick="changeReturnQty('${groupKey}', 1)" ${qty >= maxQty ? 'disabled' : ''}>+</button>
            </div>
            <div class="qty-select-note">${qty} / ${maxQty} буцаахаар сонгосон</div>
        `;
    }else{
        btnWrap.innerHTML = `<button class="select-btn" onclick="toggleReturnSelectByKey('${groupKey}')">Буцаах</button>`;
    }
}

/* Баруун талын сагсны панелийг шинэчлэх: хайрцаг (category) тус
   бүрээр бүлэглэж, тухайн хайрцгаас нийт хэдэн ширхэг буцааж
   байгааг гарчигт нь харуулна. */
function updateReturnSidebar(){
    const sidebar = document.getElementById('cartSidebar');
    const listEl = document.getElementById('cartSidebarList');
    const totalCountEl = document.getElementById('cartTotalCount');
    const contentEl = document.getElementById('mainContent');

    if(selectedReturnItems.length === 0){
        sidebar.classList.remove('show');
        contentEl.classList.remove('shifted');
        listEl.innerHTML = '';
        totalCountEl.textContent = '0 ш';
        return;
    }

    sidebar.classList.add('show');
    contentEl.classList.add('shifted');

    const totalQty = selectedReturnItems.reduce((sum, item) => sum + item.qty, 0);
    totalCountEl.textContent = `${totalQty} ш`;

    const groups = {};
    selectedReturnItems.forEach(item => {
        const catId = item.categoryId || '__none__';
        if(!groups[catId]) groups[catId] = [];
        groups[catId].push(item);
    });

    listEl.innerHTML = '';

    Object.keys(groups).forEach(catId => {
        const items = groups[catId];
        const catTotal = items.reduce((s, i) => s + i.qty, 0);
        const catLabel = catId === '__none__' ? 'Ангилаагүй' : categoryName(catId);

        const groupEl = document.createElement('div');
        groupEl.className = 'cart-group';

        const titleEl = document.createElement('div');
        titleEl.className = 'cart-group-title';
        titleEl.textContent = `🗂️ ${catLabel} — ${catTotal} ширхэг`;
        groupEl.appendChild(titleEl);

        items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'cart-item-row';
            row.innerHTML = `
                <div class="cart-item-img">
                    ${item.catalogImageUrl
                        ? `<img src="${item.catalogImageUrl}">`
                        : `<span>🛠️</span>`}
                </div>
                <div class="cart-item-info">
                    <div class="cart-item-name">${escapeHtml(item.toolName)}</div>
                    <div class="cart-item-qty-controls">
                        <button onclick="changeReturnQty('${item.groupKey}', -1)">−</button>
                        <span>${item.qty}</span>
                        <button onclick="changeReturnQty('${item.groupKey}', 1)">+</button>
                        <button class="cart-item-remove" onclick="removeFromReturnCart('${item.groupKey}')">✕</button>
                    </div>
                </div>
            `;
            groupEl.appendChild(row);
        });

        listEl.appendChild(groupEl);
    });
}

function renderTaken(records){
    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '';

    takenRecordsCache = records;
    groupedTakenCache = groupTakenRecords(records);

    if(groupedTakenCache.length === 0){
        grid.innerHTML = '<p class="empty-msg">Одоогоор авсан багаж байхгүй байна.</p>';
        return;
    }

    groupedTakenCache.forEach(group => {
        const card = document.createElement('div');
        const selected = isGroupSelected(group.key);
        card.className = 'history-card' + (selected ? ' selected' : '');
        card.setAttribute('data-group-key', group.key);

        const qty = group.txIds.length;
        const dateStr = group.timestamp ? group.timestamp.toDate().toLocaleString('mn-MN') : '—';

        let btnWrapHtml;
        if(selected){
            const selQty = getSelectedQty(group.key);
            btnWrapHtml = `
                <div class="qty-select-controls">
                    <button onclick="changeReturnQty('${group.key}', -1)">−</button>
                    <span>${selQty}</span>
                    <button onclick="changeReturnQty('${group.key}', 1)" ${selQty >= qty ? 'disabled' : ''}>+</button>
                </div>
                <div class="qty-select-note">${selQty} / ${qty} буцаахаар сонгосон</div>
            `;
        }else{
            btnWrapHtml = `<button class="select-btn" onclick="toggleReturnSelectByKey('${group.key}')">Буцаах</button>`;
        }

        card.innerHTML =
            '<div class="history-images">' +
                (qty > 1 ? `<div class="qty-corner-badge">× ${qty}</div>` : '') +
                '<div class="img-half">' +
                    (group.catalogImageUrl
                        ? '<img src="' + group.catalogImageUrl + '" alt="' + escapeHtml(group.toolName) + ' - багаж">'
                        : '<div class="no-img">🛠️</div>') +
                    '<div class="img-label">Багаж</div>' +
                '</div>' +
                '<div class="img-half">' +
                    '<img src="' + group.pickupPhotoUrl + '" alt="' + escapeHtml(group.toolName) + ' - авсан үеийн зураг">' +
                    '<div class="img-label">Авсан үед</div>' +
                '</div>' +
            '</div>' +
            '<div class="tool-name">' + escapeHtml(group.toolName) + (qty > 1 ? `<span class="qty-badge">${qty} ш</span>` : '') + '</div>' +
            '<div class="tool-meta">' + escapeHtml(categoryName(group.categoryId)) + ' • ' + dateStr + '</div>' +
            '<div class="return-btn-wrap" style="margin:10px 15px 15px;">' + btnWrapHtml + '</div>';
        grid.appendChild(card);
    });
}

async function searchTaken(){
    const q = document.getElementById('searchInput').value.trim().toLowerCase();

    if(currentMode !== "taken"){
        await loadTakenTools();
    }

    if(!q) return;

    try{
        const snap = await db.collection("transactions")
            .where("status", "==", "borrowed")
            .orderBy("timestamp", "desc")
            .get();

        const records = [];
        snap.forEach(doc => {
            const data = doc.data();
            if(data.toolName.toLowerCase().includes(q)){
                records.push({ id: doc.id, ...data });
            }
        });

        document.getElementById('toolSectionTitle').textContent = '🔍 Хайлтын үр дүн: "' + q + '"';
        renderTaken(records);
    }catch(err){
        console.error(err);
    }
}

async function loadHistory(){
    currentMode = "history";
    document.getElementById('welcomeCard').style.display = 'none';
    document.getElementById('toolSection').style.display = 'block';
    document.getElementById('toolSectionTitle').textContent = "📜 Түүх (буцаасан багажууд, сүүлийн 2 хоног)";

    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '<p class="empty-msg">Уншиж байна...</p>';

    try{
        const snap = await db.collection("transactions")
            .where("status", "==", "returned")
            .orderBy("timestamp", "desc")
            .limit(100)
            .get();

        // Хэрэглэгчийн site дээр зөвхөн сүүлийн 2 хоногийн (48 цаг) бичлэгийг
        // харуулна. Admin талд бүх түүх хадгалагдсаар үлдэнэ — энэ нь зөвхөн
        // ДЭЛГЭЦИЙН шүүлт, Firestore-ийн өгөгдөл устгагдахгүй.
        const twoDaysAgoMs = Date.now() - (2 * 24 * 60 * 60 * 1000);

        const records = [];
        snap.forEach(doc => {
            const data = doc.data();
            const ts = data.returnTimestamp || data.timestamp;
            const tsMs = ts && ts.toDate ? ts.toDate().getTime() : 0;
            if(tsMs >= twoDaysAgoMs){
                records.push({ id: doc.id, ...data });
            }
        });
        renderHistory(records);
    }catch(err){
        console.error("Түүх ачаалахад алдаа:", err);
        grid.innerHTML = '<p class="empty-msg">⚠️ Ачаалахад алдаа гарлаа: ' + escapeHtml(err.message) + '</p>';
    }
}

function renderHistory(records){
    const grid = document.getElementById('toolGrid');
    grid.innerHTML = '';

    // Түүхэн жагсаалт дээр ч мөн адил нэг батчаар (нэг удаад буцаагдсан)
    // авсан ижил багажийг нэгтгэж харуулна: toolId + returnBatchId
    // (эсвэл олдоогүй бол borrowBatchId, эсвэл өөрийн id).
    const groups = {};
    const order = [];

    records.forEach(rec => {
        const batch = rec.returnBatchId || rec.borrowBatchId || rec.id;
        const key = rec.toolId + '__' + batch;

        if(!groups[key]){
            groups[key] = { ...rec, count: 0 };
            order.push(key);
        }
        groups[key].count += 1;
    });

    const grouped = order.map(key => groups[key]);

    if(grouped.length === 0){
        grid.innerHTML = '<p class="empty-msg">Түүхэн бүртгэл хоосон байна.</p>';
        return;
    }

    grouped.forEach(rec => {
        const card = document.createElement('div');
        card.className = 'history-card';
        const takenStr = rec.timestamp ? rec.timestamp.toDate().toLocaleString('mn-MN') : '—';
        const returnedStr = rec.returnTimestamp ? rec.returnTimestamp.toDate().toLocaleString('mn-MN') : '—';
        card.innerHTML =
            '<div class="history-images">' +
                (rec.count > 1 ? `<div class="qty-corner-badge">× ${rec.count}</div>` : '') +
                '<div class="img-half">' +
                    (rec.catalogImageUrl
                        ? '<img src="' + rec.catalogImageUrl + '" alt="' + escapeHtml(rec.toolName) + ' - багаж">'
                        : '<div class="no-img">🛠️</div>') +
                    '<div class="img-label">Багаж</div>' +
                '</div>' +
                '<div class="img-half">' +
                    '<img src="' + rec.pickupPhotoUrl + '" alt="' + escapeHtml(rec.toolName) + ' - авсан">' +
                    '<div class="img-label">Авсан</div>' +
                '</div>' +
                '<div class="img-half">' +
                    '<img src="' + rec.returnPhotoUrl + '" alt="' + escapeHtml(rec.toolName) + ' - өгсөн">' +
                    '<div class="img-label">Өгсөн</div>' +
                '</div>' +
            '</div>' +
            '<div class="tool-name">' + escapeHtml(rec.toolName) + (rec.count > 1 ? `<span class="qty-badge">${rec.count} ш</span>` : '') + '</div>' +
            '<div class="tool-meta">' +
                escapeHtml(categoryName(rec.categoryId)) + '<br>' +
                'Авсан: ' + takenStr + '<br>' +
                'Өгсөн: ' + returnedStr +
            '</div>';
        grid.appendChild(card);
    });
}

/* ---------- Camera ---------- */
let cameraStream = null;
let capturedBlob = null;
let isSaving = false;
let currentFacing = "user"; // "user" = урд тал, "environment" = арын тал
let lastReturnGroups = []; // [{ categoryId, items:[{toolName, qty}] }] - буцаасан багажийг хайрцгаар нь бүлэглэсэн

async function openCamera(){
    if(selectedReturnItems.length === 0) return;

    document.getElementById('cameraModal').classList.add('show');
    document.getElementById('cameraStatus').textContent = "Камер бэлдэж байна...";
    document.getElementById('cameraStatus').style.display = '';
    document.getElementById('cameraControls').style.display = '';
    document.getElementById('returnSuccess').classList.remove('show');
    document.getElementById('btnCapture').style.display = 'inline-block';
    document.getElementById('btnRetake').style.display = 'none';
    document.getElementById('btnConfirm').style.display = 'none';

    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('cameraCanvas');
    video.style.display = 'block';
    canvas.style.display = 'none';

    currentFacing = "user"; // Хэрэглэгчийн нүүр царайг зурагдахын тулд эхэлж УРД талын камераар нээнэ
    await startCameraStream();
}

async function startCameraStream(){
    const video = document.getElementById('cameraVideo');
    try{
        if(cameraStream){
            cameraStream.getTracks().forEach(t => t.stop());
        }
        cameraStream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: currentFacing },
            audio: false
        });
        video.srcObject = cameraStream;
        document.getElementById('cameraStatus').textContent = "Багажтайгаа сэлфи зураг ав";
    }catch(err){
        document.getElementById('cameraStatus').textContent =
            "⚠️ Камерт хандах боломжгүй байна. Зөвшөөрөл олгосон эсэхээ шалгана уу.";
        console.error(err);
    }
}

async function switchCamera(){
    currentFacing = (currentFacing === "user") ? "environment" : "user";
    document.getElementById('cameraStatus').textContent = "Камер сэлгэж байна...";
    await startCameraStream();
}

function captureImage(){
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('cameraCanvas');

    const maxWidth = 800;
    let w = video.videoWidth, h = video.videoHeight;
    if(w > maxWidth){
        h = Math.round(h * maxWidth / w);
        w = maxWidth;
    }
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(video, 0, 0, w, h);

    video.style.display = 'none';
    canvas.style.display = 'block';

    canvas.toBlob(blob => {
        capturedBlob = blob;
    }, 'image/jpeg', 0.75);

    document.getElementById('btnCapture').style.display = 'none';
    document.getElementById('btnRetake').style.display = 'inline-block';
    document.getElementById('btnConfirm').style.display = 'inline-block';
    document.getElementById('cameraStatus').textContent = "Зураг авлаа. Зөв бол хадгал, эсвэл дахин ав.";
}

function retakeImage(){
    const video = document.getElementById('cameraVideo');
    const canvas = document.getElementById('cameraCanvas');

    video.style.display = 'block';
    canvas.style.display = 'none';
    capturedBlob = null;

    document.getElementById('btnCapture').style.display = 'inline-block';
    document.getElementById('btnRetake').style.display = 'none';
    document.getElementById('btnConfirm').style.display = 'none';
    document.getElementById('cameraStatus').textContent = "Багажтайгаа сэлфи зураг ав";
}

async function confirmCapture(){
    if(!capturedBlob || selectedReturnItems.length === 0 || isSaving){
        return;
    }
    isSaving = true;
    document.getElementById('btnConfirm').disabled = true;
    document.getElementById('cameraStatus').textContent = "Хадгалж байна...";

    try{
        // 1. Өгсөн үеийн зургийг (нэг зураг, бүх багажид адилхан) Storage-д
        //    нэг удаа хадгална
        const filename = 'returns/' + Date.now() + '_' + Math.random().toString(36).slice(2) + '.jpg';
        const ref = storage.ref(filename);
        await ref.put(capturedBlob);
        const returnPhotoUrl = await ref.getDownloadURL();

        // 2. Нэг зэрэг буцаагдсан бичлэгүүдийг холбох зориулалттай batchId
        const returnBatchId = 'rb_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);

        // 3. Сонгогдсон БҮХ бичлэгийг боловсруулна (тус бүрийг Firestore
        //    transaction-оор хамгаалсан байдлаар). Мөн аль хайрцгуудад
        //    буцаах ёстойг цуглуулна (том мессежинд ашиглана).
        for(const item of selectedReturnItems){
            const toolRef = db.collection("tools").doc(item.toolId);

            for(const txId of item.txIds){
                const txRef = db.collection("transactions").doc(txId);

                await db.runTransaction(async (transaction) => {
                    const toolDoc = await transaction.get(toolRef);

                    if(toolDoc.exists){
                        const data = toolDoc.data();
                        const available = data.availableQty ?? 0;
                        const total = data.totalQty ?? available + 1;
                        const newAvailable = Math.min(total, available + 1);
                        transaction.update(toolRef, { availableQty: newAvailable });
                    }

                    transaction.update(txRef, {
                        status: "returned",
                        type: "return",
                        returnPhotoUrl: returnPhotoUrl,
                        returnBatchId: returnBatchId,
                        returnTimestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });
            }
        }

        // 4. БҮХ багаж амжилттай буцаагдсаны дараа ESP32-д зориулсан
        //    "trigger" бичлэгийг 1 удаа үүсгэнэ.
        await db.collection("esp32_triggers").doc("door1").set({
            triggered: true,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            toolNames: selectedReturnItems.map(item => `${item.toolName} x${item.qty}`)
        });

        // Том амжилтын панел дээр харуулах өгөгдлийг хадгална — аль
        // хайрцагт, ямар багажийг хэдэн ширхэгээр хураах ёстойг харуулна
        const groupMap = {};
        selectedReturnItems.forEach(item => {
            const catId = item.categoryId || '__none__';
            if(!groupMap[catId]) groupMap[catId] = [];
            groupMap[catId].push({ toolName: item.toolName, qty: item.qty });
        });
        lastReturnGroups = Object.keys(groupMap).map(catId => ({
            categoryId: catId,
            items: groupMap[catId]
        }));

        document.getElementById('cameraVideo').style.display = 'none';
        document.getElementById('cameraCanvas').style.display = 'none';
        document.getElementById('cameraControls').style.display = 'none';
        document.getElementById('cameraStatus').style.display = 'none';

        document.getElementById('returnSuccessList').innerHTML = buildReturnSuccessHtml();
        document.getElementById('returnSuccess').classList.add('show');

    }catch(err){
        console.error("Буцаахад алдаа:", err);
        document.getElementById('cameraStatus').textContent =
            "⚠️ Алдаа гарлаа: " + err.message;
    }finally{
        isSaving = false;
        document.getElementById('btnConfirm').disabled = false;
    }
}

/* Хайрцаг тус бүрээр бүлэглэж, "Хайрцаг 1 — Ажилын Бээлий × 4" гэх
   мэт тод харагдахуйц мөрүүд бүхий HTML үүсгэнэ. Буцаах амжилтын
   том панелд ашиглагдана. */
function buildReturnSuccessHtml(){
    if(lastReturnGroups.length === 0){
        return '<div class="return-success-box-line"><div class="box-name">📦 Багажаа тохирох хайрцагт хураагаарай</div></div>';
    }
    return lastReturnGroups.map(group => {
        const label = group.categoryId === '__none__' ? 'Ангилаагүй' : categoryName(group.categoryId);
        const itemLines = group.items.map(i => `${escapeHtml(i.toolName)} × ${i.qty}`).join('<br>');
        return `
            <div class="return-success-box-line">
                <div class="box-name">📦 ${escapeHtml(label)}</div>
                <div class="box-items">${itemLines}</div>
            </div>
        `;
    }).join('');
}

async function closeReturnSuccess(){
    document.getElementById('returnSuccess').classList.remove('show');
    closeCamera();
    selectedReturnItems = [];
    updateReturnSidebar();
    loadTakenTools();
}

function closeCamera(){
    if(cameraStream){
        cameraStream.getTracks().forEach(track => track.stop());
        cameraStream = null;
    }
    capturedBlob = null;
    document.getElementById('cameraModal').classList.remove('show');
}
